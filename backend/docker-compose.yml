services:
  # 前端 Vite 应用
  frontend:
    build:
      context: ../teacher-platform
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      # 浏览器访问后端地址
      - VITE_API_BASE=http://localhost:8000
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - ai-teaching-network

  # FastAPI 应用
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
        PIP_TRUSTED_HOST: pypi.tuna.tsinghua.edu.cn
        PIP_RETRIES: "10"
        PIP_TIMEOUT: "120"
    image: ai-teaching-backend:dev
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/ai_teaching
      - DATABASE_URL_SYNC=postgresql://postgres:postgres@db:5432/ai_teaching
      - REDIS_URL=redis://cache:6379/0
      - JWT_SECRET_KEY=dev-secret-key-change-in-production
      - DEBUG=true
    volumes:
      - ./.env.example:/app/.env.example:ro
      - media_files:/app/media
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai-teaching-network

  # PostgreSQL 数据库
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ai_teaching
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ai-teaching-network

  # Redis 缓存 + Celery Broker
  cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - ai-teaching-network

  # Celery Worker 异步任务处理
  worker:
    image: ai-teaching-backend:dev
    pull_policy: never
    command: celery -A app.celery worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/ai_teaching
      - DATABASE_URL_SYNC=postgresql://postgres:postgres@db:5432/ai_teaching
      - REDIS_URL=redis://cache:6379/0
      - JWT_SECRET_KEY=dev-secret-key-change-in-production
      - DEBUG=true
    volumes:
      - media_files:/app/media
    depends_on:
      - app
      - cache
      - db
    restart: unless-stopped
    networks:
      - ai-teaching-network

volumes:
  postgres_data:
  redis_data:
  media_files:

networks:
  ai-teaching-network:
    driver: bridge
